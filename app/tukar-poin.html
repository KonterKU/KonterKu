<script>
/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
const fmt  = n => Number(n||0).toLocaleString('id-ID');
const wait = ms => new Promise(r => setTimeout(r, ms));

function showToast(msg, icon = '✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `<span style="font-size:16px;">${icon}</span><span id="toast-msg">${msg}</span>`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ─────────────────────────────────────────────
   TIER CONFIG  (mirror dari index utama)
───────────────────────────────────────────── */
const TIERS = [
  { nama:'Bronze',  min:0,    max:999,   color:'#cd7f32', bg:'rgba(205,127,50,0.15)',  icon:'🥉' },
  { nama:'Silver',  min:1000, max:4999,  color:'#94a3b8', bg:'rgba(148,163,184,0.15)', icon:'🥈' },
  { nama:'Gold',    min:5000, max:14999, color:'#f59e0b', bg:'rgba(245,158,11,0.15)',  icon:'🥇' },
  { nama:'Platinum',min:15000,max:Infinity,color:'#38bdf8',bg:'rgba(56,189,248,0.15)',icon:'💎' },
];
function getTier(poin) {
  return TIERS.find(t => poin >= t.min && poin <= t.max) || TIERS[0];
}

/* ─────────────────────────────────────────────
   FIREBASE – ambil data pelanggan
───────────────────────────────────────────── */
let pelangganList = [];
let currentUser   = null; // staff yg login

async function waitFirebase() {
  return new Promise(res => {
    const t = setInterval(() => {
      if (window._db) { clearInterval(t); res(); }
    }, 80);
  });
}

async function loadPelanggan(storeId) {
  if (!storeId) return;

  // ── Cara 1: sub-koleksi pelanggan (pola lama) ──
  const snap = await window._db.collection('stores').doc(storeId)
    .collection('pelanggan').get().catch(() => null);
  if (snap && !snap.empty) {
    pelangganMode = 'subcol';
    pelangganList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    return;
  }

  // ── Cara 2: pelanggan tersimpan sebagai array di dalam dokumen utama (pola index.html) ──
  const doc = await window._db.collection('stores').doc(storeId)
    .get().catch(() => null);
  if (doc && doc.exists) {
    const data = doc.data();
    const arr = data.pelanggan || (data.db && data.db.pelanggan) || [];
    pelangganMode = 'array';
    pelangganList = arr.map((c, i) => ({ id: c.id || String(i), ...c }));
    return;
  }

  // ── Cara 3: coba dari koleksi user_stores ──
  const doc2 = await window._db.collection('user_stores').doc(storeId)
    .get().catch(() => null);
  if (doc2 && doc2.exists) {
    const data2 = doc2.data();
    const arr2 = data2.pelanggan || (data2.db && data2.db.pelanggan) || [];
    pelangganMode = 'user_stores';
    pelangganList = arr2.map((c, i) => ({ id: c.id || String(i), ...c }));
  }
}

/* Muat konfigurasi poin dari Firestore (tersimpan di dalam field db.poinConfig) */
async function loadPoinConfig(sId) {
  if (!sId) return;
  try {
    let raw = null;
    if (pelangganMode === 'user_stores') {
      const d = await window._db.collection('user_stores').doc(sId).get();
      raw = d.exists ? (d.data().db?.poinConfig || d.data().poinConfig || null) : null;
    } else {
      const d = await window._db.collection('stores').doc(sId).get();
      raw = d.exists ? (d.data().db?.poinConfig || d.data().poinConfig || null) : null;
    }
    if (raw) {
      poinCfg = Object.assign({ nilaiTukar: 1000, daftarHadiah: [], bonusTrx: [] }, raw);
    }
  } catch(e) { console.warn('loadPoinConfig error:', e); }
}

/* Cari storeId dari user yg login — disesuaikan dengan struktur Firestore index.html */
async function getStoreId(uid) {
  // ── Cara 1: stores/{uid} langsung (pola utama index.html) ──
  const direct = await window._db.collection('stores').doc(uid)
    .get().catch(() => null);
  if (direct && direct.exists) return uid;

  // ── Cara 2: user_stores dengan field owner_uid (pola multi-toko index.html) ──
  const snap = await window._db.collection('user_stores')
    .where('owner_uid', '==', uid).limit(1).get().catch(() => null);
  if (snap && !snap.empty) return snap.docs[0].id;

  // ── Cara 3: stores dengan field ownerUid (pola lama, fallback) ──
  const snap2 = await window._db.collection('stores')
    .where('ownerUid', '==', uid).limit(1).get().catch(() => null);
  if (snap2 && !snap2.empty) return snap2.docs[0].id;

  // ── Cara 4: cek sebagai staff ──
  const snap3 = await window._db.collection('stores')
    .where('staffUids', 'array-contains', uid).limit(1).get().catch(() => null);
  if (snap3 && !snap3.empty) return snap3.docs[0].id;

  return null;
}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 1) { searchResults.classList.remove('open'); return; }

  const filtered = pelangganList.filter(c =>
    (c.nama  || '').toLowerCase().includes(q) ||
    (c.phone || '').replace(/\D/g,'').includes(q.replace(/\D/g,''))
  ).slice(0, 8);

  if (filtered.length === 0) {
    searchResults.innerHTML = `<div class="search-item" style="cursor:default;opacity:.5;">
      <span style="font-size:12px;font-weight:700;color:#64748b;">Pelanggan tidak ditemukan</span>
    </div>`;
    searchResults.classList.add('open');
    return;
  }

  searchResults.innerHTML = filtered.map(c => {
    const poin  = Number(c.poin || 0);
    const tier  = getTier(poin);
    const inisial = (c.nama||'?')[0].toUpperCase();
    return `<div class="search-item" onclick="pilihPelanggan('${c.id}')">

        <div class="si-name">${c.nama || '-'}</div>

      </div>
      <div class="si-poin">${fmt(poin)} pts</div>
    </div>`;
  }).join('');
  searchResults.classList.add('open');
});

function switchTab(tab) {
  const ph = document.getElementById('panel-hadiah');
  const pd = document.getElementById('panel-diskon');
  const th = document.getElementById('tab-hadiah');
  const td = document.getElementById('tab-diskon');
  if (!ph || !pd) return;

    ph.style.display = 'block'; pd.style.display = 'none';
    if (th) { th.style.background='#059669'; th.style.color='#fff'; th.style.borderColor='#059669'; }
    if (td) { td.style.background='transparent'; td.style.color='#7c3aed'; td.style.borderColor='rgba(124,58,237,0.3)'; }
  } else {
    ph.style.display = 'none'; pd.style.display = 'block';
    if (td) { td.style.background='#7c3aed'; td.style.color='#fff'; td.style.borderColor='#7c3aed'; }

  }
}

async function tukarHadiah(hadiahIdx) {
  const c = pelangganList.find(x => x.id === selectedId);
  if (!c) return;
  const poin    = Number(c.poin || 0);
  const hadiah  = (poinCfg.daftarHadiah || [])[hadiahIdx];
  if (!hadiah) return;
  if (poin < hadiah.poin) {
    Swal.fire({ icon:'info', title:'Poin Kurang', text:`Butuh ${fmt(hadiah.poin)} poin, kamu punya ${fmt(poin)} poin.`, customClass:{popup:'swal2-ku'} });
    return;
  }
  const sisaPoin = poin - hadiah.poin;

  const res = await Swal.fire({
    title: 'Konfirmasi Tukar Hadiah',
    html: `
      <div style="text-align:center;padding:8px 0;">
        <div style="font-size:40px;margin-bottom:8px;">🎁</div>
        <div style="font-size:18px;font-weight:900;color:#fff;margin-bottom:4px;">${hadiah.nama}</div>
        <div style="font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:14px;">akan ditukar dengan</div>
        <div style="background:rgba(5,150,105,0.08);border:1.5px solid rgba(5,150,105,0.25);border-radius:16px;padding:16px;">
          <div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#34d399,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${fmt(hadiah.poin)} poin</div>
          ${sisaPoin > 0 ? `<div style="font-size:10px;color:#64748b;font-weight:700;margin-top:6px;">Sisa ${fmt(sisaPoin)} poin tetap tersimpan</div>` : '<div style="font-size:10px;color:#ef4444;font-weight:700;margin-top:6px;">Semua poin habis</div>'}
        </div>
      </div>`,
    showCancelButton: true,
    confirmButtonText: '🎁 Ambil Hadiah',
    cancelButtonText: 'Batal',
    confirmButtonColor: '#059669',
    customClass: { popup: 'swal2-ku' }
  });

  if (!res.isConfirmed) return;

  try {
    const newPoin = sisaPoin;
    const redeemEntry = {
      tgl: new Date().toISOString(),
      poinDipakai: hadiah.poin,
      nilaiDiskon: 0,
      hadiah: hadiah.nama,
      tipe: 'hadiah'
    };
    await _doSavePoin(newPoin, redeemEntry);

    console.error(err);
    Swal.fire({ icon:'error', title:'Gagal', text:'Terjadi kesalahan: '+err.message, customClass:{popup:'swal2-ku'} });
  }
}

/* ─────────────────────────────────────────────
   HELPER: simpan poin ke Firestore + local
───────────────────────────────────────────── */
async function _doSavePoin(newPoin, redeemEntry) {
  const btnTukar = document.getElementById('btn-tukar');
  if (btnTukar) { btnTukar.disabled = true; btnTukar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses…'; }

    // Update local list dulu
    const idx = pelangganList.findIndex(x => x.id === selectedId);
    if (idx !== -1) {
      pelangganList[idx].poin = newPoin;
      pelangganList[idx].redeemHistory = [...(pelangganList[idx].redeemHistory || []), redeemEntry];
    }

    if (pelangganMode === 'subcol') {
      // ── Pola lama: sub-koleksi ──
      const ref = window._db.collection('stores').doc(storeId)
        .collection('pelanggan').doc(selectedId);
      await ref.update({
        poin: newPoin,
        redeemHistory: firebase.firestore.FieldValue.arrayUnion(redeemEntry),
        updatedAt: new Date().toISOString()
      });

    } else if (pelangganMode === 'array') {
      // ── Pola index.html: pelanggan = array di dokumen stores/{storeId} ──
      const docRef = window._db.collection('stores').doc(storeId);
      const docSnap = await docRef.get();
      const docData = docSnap.data();
      // Cari di root atau dalam field db
      const inDb = docData.db && Array.isArray(docData.db.pelanggan);
      const arrKey = inDb ? 'db.pelanggan' : 'pelanggan';
      const arr = inDb ? (docData.db.pelanggan || []) : (docData.pelanggan || []);
      const updatedArr = arr.map(p => {
        const pid = p.id || '';
        if (pid !== selectedId) return p;
        return {
          ...p,
          poin: newPoin,
          redeemHistory: [...(p.redeemHistory || []), redeemEntry],
          updatedAt: new Date().toISOString()
        };
      });
      if (inDb) {
        await docRef.update({ 'db.pelanggan': updatedArr });
      } else {
        await docRef.update({ pelanggan: updatedArr });
      }

    } else if (pelangganMode === 'user_stores') {
      // ── Pola multi-toko: user_stores/{storeId} ──
      const docRef = window._db.collection('user_stores').doc(storeId);
      const docSnap = await docRef.get();
      const docData = docSnap.data();
      const inDb = docData.db && Array.isArray(docData.db.pelanggan);
      const arr = inDb ? (docData.db.pelanggan || []) : (docData.pelanggan || []);
      const updatedArr = arr.map(p => {
        if ((p.id || '') !== selectedId) return p;
        return {
          ...p,
          poin: newPoin,
          redeemHistory: [...(p.redeemHistory || []), redeemEntry],
          updatedAt: new Date().toISOString()
        };
      });
      if (inDb) {
        await docRef.update({ 'db.pelanggan': updatedArr });
      } else {
        await docRef.update({ pelanggan: updatedArr });
      }
    }

    const updatedCust = pelangganList[idx !== -1 ? idx : 0];
    if (updatedCust) renderKartu(updatedCust);
}

/* ============================================================
   REQUEST MANAGEMENT (kasir sisi)
============================================================ */
let reqUnsubscribe = null;

function switchNavTab(tab) {
  const isCari = tab === 'cari';
  document.getElementById('tab-nav-cari').className = 'top-tab ' + (isCari ? 'aktif' : 'idle');
  document.getElementById('tab-nav-req').className  = 'top-tab ' + (!isCari ? 'aktif' : 'idle');
  document.getElementById('search-wrap').style.display  = isCari ? '' : 'none';
  document.getElementById('card-wrap').style.display    = isCari ? '' : 'none';
  document.getElementById('panel-request').style.display = !isCari ? '' : 'none';
  if (!isCari) loadRequests();
}

function listenRequestBadge() {
  if (!storeId) return;
  if (reqUnsubscribe) reqUnsubscribe();
  reqUnsubscribe = window._db.collection('poin_requests')
    .where('storeId', '==', storeId)
    .where('status', '==', 'pending')
    .onSnapshot(snap => {
      const count = snap ? snap.size : 0;
      const badge = document.getElementById('req-count-badge');
      if (count > 0) {
        badge.style.display = '';
        badge.textContent = count;
        // Notif jika tab tidak aktif
        if (document.getElementById('panel-request').style.display === 'none') {
          showToast('Ada ' + count + ' request penukaran baru!', 'bell');
        }
      } else {
        badge.style.display = 'none';
      }
    }, () => {});
}

async function loadRequests() {
  const wrap = document.getElementById('req-list-wrap');
  wrap.innerHTML = '<div class="empty-req"><i class="fas fa-spinner" style="animation:spin 1s linear infinite;font-size:20px;color:#334155;margin-bottom:8px;display:block;"></i>Memuat request...</div>';

  if (!storeId) {
    wrap.innerHTML = '<div class="empty-req">Toko belum terdeteksi.</div>';
    return;
  }

  const snap = await window._db.collection('poin_requests')
    .where('storeId', '==', storeId)
    .where('status', '==', 'pending')
    .orderBy('createdAt', 'desc')
    .get().catch(() => null);

  if (!snap || snap.empty) {
    wrap.innerHTML = '<div class="empty-req"><i class="fas fa-check-circle" style="font-size:24px;color:#10b981;margin-bottom:8px;display:block;"></i>Tidak ada request yang menunggu</div>';
    return;
  }

  const fmt2 = n => Number(n||0).toLocaleString('id-ID');
  wrap.innerHTML = snap.docs.map(doc => {
    const r = doc.data();
    const label = r.tipe === 'hadiah'
      ? `🎁 Hadiah: <b>${r.hadiah}</b> (${fmt2(r.poinDipakai)} poin)`
      : `💸 Diskon: <b>Rp ${fmt2(r.nilaiDiskon)}</b> (${fmt2(r.poinDipakai)} poin)`;
    return `
      <div class="req-card" id="reqcard-${doc.id}">
        <div class="req-card-header">
          <div class="req-avatar">👤</div>
          <div>
            <div class="req-nama">${r.pelangganNama}</div>
            <div class="req-hp">${r.pelangganHp}</div>
            <div class="req-poin">Poin saat ini: ${fmt2(r.poinSaatIni)}</div>
          </div>
        </div>
        <div class="req-detail">${label}</div>
        <div class="req-actions">
          <button class="btn-konfirmasi" onclick="konfirmasiRequest('${doc.id}')">
            <i class="fas fa-check" style="margin-right:5px;"></i>Konfirmasi & Tukar
          </button>
          <button class="btn-tolak" onclick="tolakRequest('${doc.id}')">
            <i class="fas fa-times" style="margin-right:5px;"></i>Tolak
          </button>
        </div>
        <div class="req-waktu"><i class="fas fa-clock" style="margin-right:4px;"></i>${r.tgl||''} ${r.jam||''}</div>
      </div>`;
  }).join('');
}

async function konfirmasiRequest(docId) {
  const docRef = window._db.collection('poin_requests').doc(docId);
  const snap   = await docRef.get().catch(() => null);
  if (!snap || !snap.exists) { showToast('Request tidak ditemukan', 'error'); return; }
  const r = snap.data();

  const ok = await Swal.fire({
    icon: 'question', title: 'Konfirmasi Penukaran',
    html: `Proses penukaran poin untuk <b>${r.pelangganNama}</b>?<br>
      <span style="font-size:12px;color:#94a3b8;">Poin akan langsung dipotong dari akun pelanggan.</span>`,
    showCancelButton: true, confirmButtonText: 'Ya, Proses!', cancelButtonText: 'Batal',
    customClass: { popup: 'swal2-ku' }
  });
  if (!ok.isConfirmed) return;

  // Cari pelanggan di list dan potong poin
  const listSnap = await window._db.collection('user_stores').doc(storeId).get().catch(()=>null);
  let pelList = [], inDb = false, docRefStore = null;
  if (listSnap && listSnap.exists) {
    const d = listSnap.data();
    if (d.pelanggan && d.pelanggan.length) { pelList = d.pelanggan; inDb = false; docRefStore = listSnap.ref; }
    else if (d.db && d.db.pelanggan) { pelList = d.db.pelanggan; inDb = true; docRefStore = listSnap.ref; }
  }
  if (!pelList.length) {
    const s2 = await window._db.collection('stores').doc(storeId).get().catch(()=>null);
    if (s2 && s2.exists) {
      const d = s2.data();
      pelList = d.pelanggan || (d.db && d.db.pelanggan) || [];
      inDb = !!(d.db && d.db.pelanggan);
      docRefStore = s2.ref;
    }
  }

  const pelangganId = r.pelangganId;
  const idx = pelList.findIndex(p => (p.id||p.hp) === pelangganId);
  if (idx === -1) { showToast('Data pelanggan tidak ditemukan!', 'error'); return; }

  const poinLama   = Number(pelList[idx].poin || pelList[idx].point || 0);
  const poinPotong = Number(r.poinDipakai || 0);
  const poinBaru   = Math.max(0, poinLama - poinPotong);

  const now = new Date();
  const tgl = now.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  const riwayatEntry = {
    tgl, poinDipakai: poinPotong,
    ...(r.tipe === 'hadiah' ? { hadiah: r.hadiah } : { nilaiDiskon: r.nilaiDiskon })
  };

  pelList[idx] = {
    ...pelList[idx],
    poin: poinBaru,
    redeemHistory: [...(pelList[idx].redeemHistory || []), riwayatEntry]
  };

  // Simpan ke Firestore
  if (inDb) { await docRefStore.update({ 'db.pelanggan': pelList }); }
  else       { await docRefStore.update({ pelanggan: pelList }); }

  // Update status request
  await docRef.update({ status: 'selesai', selesaiAt: firebase.firestore.FieldValue.serverTimestamp() });

  // Hapus card dari UI
  const card = document.getElementById('reqcard-' + docId);
  if (card) card.remove();
  if (!document.querySelector('.req-card')) {
    document.getElementById('req-list-wrap').innerHTML =
      '<div class="empty-req"><i class="fas fa-check-circle" style="font-size:24px;color:#10b981;margin-bottom:8px;display:block;"></i>Tidak ada request yang menunggu</div>';
  }

  showToast('Poin berhasil ditukar untuk ' + r.pelangganNama + '!');
  Swal.fire({ icon:'success', title:'Berhasil!',
    html:`Poin <b>${r.pelangganNama}</b> berhasil dipotong.<br>Sisa poin: <b style="color:#38BDF8;">${Number(poinBaru).toLocaleString('id-ID')}</b>`,
    customClass:{popup:'swal2-ku'} });
}

async function tolakRequest(docId) {
  const ok = await Swal.fire({
    icon:'warning', title:'Tolak Request?',
    text:'Request penukaran ini akan ditolak dan pelanggan tidak jadi menukar poin.',
    showCancelButton:true, confirmButtonText:'Ya, Tolak', cancelButtonText:'Batal',
    customClass:{popup:'swal2-ku'}
  });
  if (!ok.isConfirmed) return;

  await window._db.collection('poin_requests').doc(docId).update({
    status: 'ditolak',
    ditolakAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  const card = document.getElementById('reqcard-' + docId);
  if (card) card.remove();
  if (!document.querySelector('.req-card')) {
    document.getElementById('req-list-wrap').innerHTML =
      '<div class="empty-req"><i class="fas fa-check-circle" style="font-size:24px;color:#10b981;margin-bottom:8px;display:block;"></i>Tidak ada request yang menunggu</div>';
  }
  showToast('Request ditolak');
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toast-msg');
  if (!toast) return;
  toastMsg.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
